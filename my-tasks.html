<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks - TaskFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">TaskFlow</div>
      <nav class="menu">
        <button class="menu-item" onclick="navigate('index.html')">Dashboard</button>
        <button class="menu-item" onclick="navigate('projects.html')">Projects</button>
        <button class="menu-item active" onclick="navigate('my-tasks.html')">My Tasks</button>
        <button class="menu-item" onclick="navigate('calendar.html')">Calendar</button>
        <button class="menu-item" onclick="navigate('time-manager.html')">Time Manager</button>
        <button class="menu-item" onclick="navigate('settings.html')">Settings</button>
      </nav>
    </aside>

    <main class="dashboard">
      <header class="topbar">
        <h1>My Tasks</h1>
        <div style="display: flex; gap: 8px;">
          <button onclick="fetchTasks()" style="padding: 8px 12px; background: #f9fafb; border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer;">Refresh</button>
          <input type="text" id="search-tasks" placeholder="Search tasks..." />
        </div>
      </header>

      <section class="content-grid" style="grid-template-columns: 300px 1fr;">
        <section class="panel">
          <div class="panel-header">
            <h3>Task Stats</h3>
          </div>

          <div class="task-stats">
            <div class="stat-item">
              <span class="stat-label">Active</span>
              <span class="stat-value" id="active-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Completed</span>
              <span class="stat-value" id="completed-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Overdue</span>
              <span class="stat-value danger" id="overdue-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Today</span>
              <span class="stat-value" id="today-count">0</span>
            </div>
          </div>

          <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e7eb;">
            <p style="font-weight: 600; margin-bottom: 10px;">Filter by Category</p>
            <div class="category-filter">
              <button class="filter-btn active" onclick="filterByCategory('all')">All</button>
              <button class="filter-btn" onclick="filterByCategory('work')">Work</button>
              <button class="filter-btn" onclick="filterByCategory('personal')">Personal</button>
              <button class="filter-btn" onclick="filterByCategory('shopping')">Shopping</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h3>All Tasks</h3>
            <select id="sort-tasks" onchange="sortTasks(this.value)">
              <option value="dueDate">Sort by Due Date</option>
              <option value="priority">Sort by Priority</option>
              <option value="created">Sort by Created</option>
            </select>
          </div>

          <div id="tasks-container">
            <div class="empty">No tasks yet. Create one from the dashboard!</div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <style>
    .task-stats {
      display: grid;
      gap: 12px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .stat-label {
      color: #6b7280;
      font-size: 0.875rem;
    }

    .stat-value {
      font-weight: 700;
      font-size: 1.25rem;
      color: #f97316;
    }

    .stat-value.danger {
      color: #b91c1c;
    }

    .category-filter {
      display: grid;
      gap: 8px;
    }

    .filter-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #374151;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #f97316;
      border-color: #f97316;
      color: #ffffff;
    }

    .filter-btn:hover {
      border-color: #f97316;
    }

    #sort-tasks {
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .category-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      background: #e5e7eb;
      color: #374151;
    }

    .category-badge.work {
      background: #dbeafe;
      color: #1e40af;
    }

    .category-badge.personal {
      background: #ede9fe;
      color: #5b21b6;
    }

    .category-badge.shopping {
      background: #fef3c7;
      color: #92400e;
    }
  </style>

  <script>
    function navigate(page) {
      window.location.href = page;
    }

    function parseLocalDate(dateString) {
      // Parse date string in local timezone (not UTC)
      const [year, month, day] = dateString.split('-');
      return new Date(year, parseInt(month) - 1, day);
    }

    let tasks = [];
    let currentFilter = "all";
    let currentSort = "dueDate";

    async function fetchTasks() {
      const container = document.getElementById("tasks-container");
      container.innerHTML = '<div class="empty">Loading tasks...</div>';

      try {
        const response = await fetch('/api/all-tasks');
        if (response.ok) {
          tasks = await response.json();
          console.log('Fetched tasks:', tasks); // Debug log
          renderTasks();
          updateStats();
        } else {
          console.error('Failed to fetch tasks:', response.status);
          container.innerHTML = '<div class="empty">Failed to load tasks. Please try again.</div>';
        }
      } catch (error) {
        console.error('Error fetching tasks:', error);
        container.innerHTML = '<div class="empty">Error loading tasks. Check console for details.</div>';
      }
    }

    function renderTasks() {
      const filtered = tasks.filter(task => {
        if (currentFilter === "all") return true;
        return task.category === currentFilter;
      });

      const sorted = filtered.sort((a, b) => {
        if (currentSort === "dueDate") {
          return parseLocalDate(a.dueDate) - parseLocalDate(b.dueDate);
        } else if (currentSort === "priority") {
          return (b.priority || 0) - (a.priority || 0);
        }
        return 0;
      });

      const container = document.getElementById("tasks-container");

      if (sorted.length === 0) {
        container.innerHTML = '<div class="empty">No tasks in this category.</div>';
        return;
      }

      container.innerHTML = sorted.map(task => `
        <div class="task-item ${task.category} ${task.completed ? 'completed' : ''} ${isOverdue(task) ? 'overdue' : ''}">
          <div class="task-top">
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')">
              <span class="task-title">${task.title}</span>
            </div>
            <span class="category-badge ${task.category}">${task.category || 'No Category'}</span>
          </div>
          <p class="task-meta">${task.description}</p>
          <div class="task-meta" style="margin-top: 8px;">
            Due: ${new Date(task.dueDate).toLocaleDateString()} ${isOverdue(task) && !task.completed ? '<span style="color: #b91c1c; font-weight: 600;">OVERDUE</span>' : ''}
          </div>
          <div class="task-actions">
            <button onclick="editTask('${task.id}')" class="edit-task">Edit</button>
            <button onclick="deleteTask('${task.id}')" class="danger">Delete</button>
          </div>
        </div>
      `).join("");

      updateStats();
    }

    function isOverdue(task) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const dueDate = parseLocalDate(task.dueDate);
      dueDate.setHours(0, 0, 0, 0);
      return dueDate < today && !task.completed;
    }

    function updateStats() {
      const active = tasks.filter(t => !t.completed).length;
      const completed = tasks.filter(t => t.completed).length;
      const overdue = tasks.filter(isOverdue).length;
      const today = tasks.filter(t => {
        const taskDate = new Date(t.dueDate);
        const todayDate = new Date();
        return taskDate.toDateString() === todayDate.toDateString();
      }).length;

      document.getElementById("active-count").textContent = active;
      document.getElementById("completed-count").textContent = completed;
      document.getElementById("overdue-count").textContent = overdue;
      document.getElementById("today-count").textContent = today;
    }

    async function toggleTask(id) {
      try {
        const response = await fetch(`/api/tasks/${id}/toggle`, {
          method: 'PATCH'
        });

        if (response.ok) {
          const result = await response.json();
          const task = tasks.find(t => t.id === parseInt(id));
          if (task) {
            task.completed = result.completed;
            renderTasks();
          }
        }
      } catch (error) {
        console.error('Error toggling task:', error);
      }
    }

    async function deleteTask(id) {
      if (confirm("Delete this task?")) {
        try {
          const response = await fetch(`/api/tasks/${id}`, {
            method: 'DELETE'
          });

          if (response.ok) {
            tasks = tasks.filter(t => t.id !== parseInt(id));
            renderTasks();
          }
        } catch (error) {
          console.error('Error deleting task:', error);
        }
      }
    }

    function editTask(id) {
      alert("Edit task: " + id + " (To be implemented with edit modal)");
    }

    function filterByCategory(category) {
      currentFilter = category;
      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      event.target.classList.add("active");
      renderTasks();
    }

    function sortTasks(sortBy) {
      currentSort = sortBy;
      renderTasks();
    }

    // Load tasks on page load
    fetchTasks();
  </script>
</body>
</html>
